name: Android APK

on:
  push:
    branches: [main]
    tags:
      - 'v*'
      - 'android-v*'
    paths:
      - 'android/**'
      - 'assets/**'
      - 'integration_test/**'
      - 'lib/**'
      - 'test/**'
      - 'tool/**'
      - 'analysis_options.yaml'
      - 'build.yaml'
      - 'Makefile'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - '.github/workflows/android-apk.yml'
  workflow_dispatch:
    inputs:
      publish_release:
        description: 'Create/update a GitHub Release with the APK'
        required: true
        default: false
        type: boolean
      release_tag:
        description: 'Release tag for manual publishing, e.g. android-v0.1.0. Empty = android-<short-sha>.'
        required: false
        default: ''
        type: string

permissions:
  contents: write

concurrency:
  group: android-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    name: Validate and build APK
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.7'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate test mocks
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Decode Android signing key
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          if [[ -z "${ANDROID_KEYSTORE_BASE64}" || -z "${ANDROID_KEYSTORE_PASSWORD}" || -z "${ANDROID_KEY_ALIAS}" || -z "${ANDROID_KEY_PASSWORD}" ]]; then
            if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
              echo "::error::Android signing secrets are required for tagged releases."
              exit 1
            fi
            echo "Android signing secrets not configured; this non-release build will use debug signing."
            exit 0
          fi
          mkdir -p "${RUNNER_TEMP}/android-signing"
          printf '%s' "${ANDROID_KEYSTORE_BASE64}" | base64 --decode > "${RUNNER_TEMP}/android-signing/upload-keystore.jks"
          echo "ANDROID_KEYSTORE_PATH=${RUNNER_TEMP}/android-signing/upload-keystore.jks" >> "${GITHUB_ENV}"

      - name: Validate, test, and build release APK
        run: make release-check-ci
        env:
          BUILD_NUMBER: ${{ github.run_number }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Rename APK artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          version=$(awk '/^version:/ { print $2; exit }' pubspec.yaml)
          build_name=${version%%+*}
          safe_ref=$(printf '%s' "${GITHUB_REF_NAME:-manual}" | tr '/ ' '--')
          apk="release/mklat-news-${build_name}-${safe_ref}.apk"
          cp dist/*.apk "$apk"
          echo "APK_PATH=$apk" >> "$GITHUB_ENV"
          ls -lh "$apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: mklat-news-android-apk-${{ github.run_number }}
          path: ${{ env.APK_PATH }}
          if-no-files-found: error
          retention-days: 30

      - name: Resolve release tag
        id: release-tag
        if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.publish_release)
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            tag="${GITHUB_REF_NAME}"
          elif [[ -n "${{ inputs.release_tag }}" ]]; then
            tag="${{ inputs.release_tag }}"
          else
            tag="android-${GITHUB_SHA::7}"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.publish_release)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release-tag.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: mklat.news ${{ steps.release-tag.outputs.tag }}
          files: ${{ env.APK_PATH }}
          fail_on_unmatched_files: true
          generate_release_notes: true
