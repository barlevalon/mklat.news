name: Landing Page

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/landing-page.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: landing-page-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync-cloudflare-dns:
    name: Point mklat.news at GitHub Pages
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.ref == 'refs/heads/main'
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_DOMAIN: mklat.news
      GITHUB_PAGES_HOST: barlevalon.github.io
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Discover Cloudflare zone
        id: cloudflare
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${CLOUDFLARE_API_TOKEN}" ]]; then
            echo "::error::CLOUDFLARE_API_TOKEN secret is required."
            exit 1
          fi

          zone_json=$(curl -fsS \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            "https://api.cloudflare.com/client/v4/zones?name=${CLOUDFLARE_DOMAIN}")

          zone_id=$(jq -r '.result[0].id // empty' <<<"${zone_json}")
          if [[ -z "${zone_id}" ]]; then
            echo "::error::Could not find Cloudflare zone for ${CLOUDFLARE_DOMAIN}."
            exit 1
          fi

          echo "zone_id=${zone_id}" >> "$GITHUB_OUTPUT"

      - name: Sync DNS records for GitHub Pages
        shell: bash
        run: |
          set -euo pipefail
          zone_id="${{ steps.cloudflare.outputs.zone_id }}"
          api="https://api.cloudflare.com/client/v4/zones/${zone_id}/dns_records"
          auth=(-H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" -H "Content-Type: application/json")

          delete_records_for_name() {
            local name="$1"
            records=$(curl -fsS "${auth[@]}" "${api}?name=${name}")
            jq -r '.result[] | select(.type == "A" or .type == "AAAA" or .type == "CNAME") | .id' <<<"${records}" |
              while read -r id; do
                [[ -z "${id}" ]] && continue
                curl -fsS -X DELETE "${auth[@]}" "${api}/${id}" >/dev/null
              done
          }

          create_record() {
            local type="$1"
            local name="$2"
            local content="$3"
            jq -n \
              --arg type "${type}" \
              --arg name "${name}" \
              --arg content "${content}" \
              '{type:$type,name:$name,content:$content,ttl:1,proxied:false}' |
              curl -fsS -X POST "${auth[@]}" --data @- "${api}" >/dev/null
          }

          delete_records_for_name "${CLOUDFLARE_DOMAIN}"
          for ip in 185.199.108.153 185.199.109.153 185.199.110.153 185.199.111.153; do
            create_record A "${CLOUDFLARE_DOMAIN}" "${ip}"
          done
          for ip in 2606:50c0:8000::153 2606:50c0:8001::153 2606:50c0:8002::153 2606:50c0:8003::153; do
            create_record AAAA "${CLOUDFLARE_DOMAIN}" "${ip}"
          done

          delete_records_for_name "www.${CLOUDFLARE_DOMAIN}"
          create_record CNAME "www.${CLOUDFLARE_DOMAIN}" "${GITHUB_PAGES_HOST}"

          echo "${CLOUDFLARE_DOMAIN} now points to GitHub Pages."
