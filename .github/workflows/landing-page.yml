name: Landing Page

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/landing-page.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: landing-page-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-cloudflare-pages:
    name: Deploy mklat.news landing page
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.ref == 'refs/heads/main'
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_PROJECT_NAME: mklat-news
      CLOUDFLARE_DOMAIN: mklat.news
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Discover Cloudflare account
        id: cloudflare
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${CLOUDFLARE_API_TOKEN}" ]]; then
            echo "::error::CLOUDFLARE_API_TOKEN secret is required."
            exit 1
          fi

          zone_json=$(curl -fsS \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            "https://api.cloudflare.com/client/v4/zones?name=${CLOUDFLARE_DOMAIN}")

          account_id=$(jq -r '.result[0].account.id // empty' <<<"${zone_json}")
          zone_id=$(jq -r '.result[0].id // empty' <<<"${zone_json}")

          if [[ -z "${account_id}" || -z "${zone_id}" ]]; then
            echo "::error::Could not find Cloudflare zone/account for ${CLOUDFLARE_DOMAIN}."
            exit 1
          fi

          echo "account_id=${account_id}" >> "$GITHUB_OUTPUT"
          echo "zone_id=${zone_id}" >> "$GITHUB_OUTPUT"
          echo "CLOUDFLARE_ACCOUNT_ID=${account_id}" >> "$GITHUB_ENV"

      - name: Ensure Cloudflare Pages project exists
        shell: bash
        run: |
          set -euo pipefail
          account_id="${{ steps.cloudflare.outputs.account_id }}"
          project_url="https://api.cloudflare.com/client/v4/accounts/${account_id}/pages/projects/${CLOUDFLARE_PROJECT_NAME}"

          status=$(curl -sS -o /tmp/cf-project.json -w '%{http_code}' \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            "${project_url}")

          if [[ "${status}" == "200" ]]; then
            echo "Cloudflare Pages project exists: ${CLOUDFLARE_PROJECT_NAME}"
            exit 0
          fi

          if [[ "${status}" != "404" ]]; then
            cat /tmp/cf-project.json
            echo "::error::Unexpected Cloudflare project lookup status: ${status}"
            exit 1
          fi

          curl -fsS -X POST \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data "{\"name\":\"${CLOUDFLARE_PROJECT_NAME}\",\"production_branch\":\"main\"}" \
            "https://api.cloudflare.com/client/v4/accounts/${account_id}/pages/projects" >/dev/null

      - name: Deploy docs to Cloudflare Pages
        run: npx --yes wrangler@latest pages deploy docs --project-name "${CLOUDFLARE_PROJECT_NAME}" --branch main

      - name: Ensure custom domain is attached
        shell: bash
        run: |
          set -euo pipefail
          account_id="${{ steps.cloudflare.outputs.account_id }}"
          domains_url="https://api.cloudflare.com/client/v4/accounts/${account_id}/pages/projects/${CLOUDFLARE_PROJECT_NAME}/domains"

          domains_json=$(curl -fsS \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            "${domains_url}")

          if jq -e --arg domain "${CLOUDFLARE_DOMAIN}" '.result[]? | select(.name == $domain)' <<<"${domains_json}" >/dev/null; then
            echo "Custom domain already attached: ${CLOUDFLARE_DOMAIN}"
            exit 0
          fi

          curl -fsS -X POST \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data "{\"name\":\"${CLOUDFLARE_DOMAIN}\"}" \
            "${domains_url}" >/dev/null
